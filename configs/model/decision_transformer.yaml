# Decision Transformer Configuration
# End-to-end decision making from world model features

model:
  name: "decision_transformer"

  # Context aggregator
  context:
    world_model_dim: 512
    state_dim: 6  # velocity, angular_vel, pitch, roll, x, y
    goal_dim: 2  # relative goal direction
    action_history_len: 10

  # Temporal context (21 frames: 10 past + current + 10 future)
  temporal:
    enabled: true
    num_past_frames: 10   # Past frames from buffer
    num_future_frames: 10  # Future frames from world model prediction
    # Total: 10 + 1 + 10 = 21 frames of context

  # Action tokenizer
  # Simplified action space: 12 actions (forward motion only)
  # RELLIS-3D contains only forward driving - no backward motion
  action_tokenizer:
    vocab_size: 12  # Total discrete actions
    embedding_dim: 128

  # Transformer architecture
  transformer:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.1
    context_length: 64  # Max sequence length

  # Output heads
  heads:
    action:
      type: "discrete"
      num_actions: 12

    confidence:
      enabled: true

    auxiliary:
      # Auxiliary prediction for better representations
      predict_traversability: true
      predict_collision: true

# Simplified Action Vocabulary (12 actions, forward motion only)
# Derived from velocity/turn-rate thresholds on pose data
# Logic: Turn-first approach - classify by turn rate first, then velocity
actions:
  # Speed control (minimal turn |omega| < 0.1)
  0: "STOP"           # |v| < 0.1 m/s
  1: "FORWARD_SLOW"   # 0.1 <= |v| < 0.5 m/s
  2: "FORWARD_MEDIUM" # 0.5 <= |v| < 1.0 m/s
  3: "FORWARD_FAST"   # |v| >= 1.0 m/s

  # Turn actions (any velocity, classified by turn rate)
  4: "TURN_LEFT_SHARP"   # omega >= 0.6 rad/s
  5: "TURN_LEFT_MEDIUM"  # 0.3 <= omega < 0.6 rad/s
  6: "TURN_LEFT_SLIGHT"  # 0.1 <= omega < 0.3 rad/s
  7: "TURN_RIGHT_SLIGHT" # -0.3 < omega <= -0.1 rad/s
  8: "TURN_RIGHT_MEDIUM" # -0.6 < omega <= -0.3 rad/s
  9: "TURN_RIGHT_SHARP"  # omega <= -0.6 rad/s

  # Combined fast forward + sharp turn
  10: "FORWARD_LEFT"  # v >= 1.0 m/s with omega >= 0.6 rad/s
  11: "FORWARD_RIGHT" # v >= 1.0 m/s with omega <= -0.6 rad/s

# Safety constraints
safety:
  min_confidence: 0.7  # Fallback threshold
  max_consecutive_turns: 5
